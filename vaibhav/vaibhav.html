<!DOCTYPE html>
<html lang="en">
<head>
<title>vaibhavmore</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Login - Secure Access</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="bank-header">
                <h1>SecureBank</h1>
                <p>Online Savings Account Management</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="accountNumber">Account Number:</label>
                    <input type="text" id="accountNumber" name="accountNumber" required placeholder="Enter your account number">
                </div>

                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <div class="form-group">
                    <label for="otp">One-Time Password (OTP):</label>
                    <input type="text" id="otp" name="otp" required placeholder="Enter OTP sent to your registered email">
                </div>

                <button type="submit" class="btn-login">Login to Your Account</button>
            </form>

            <div class="login-footer">
                <a href="#">Forgot Password?</a>
                <span>|</span>
                <a href="#">Register New Account</a>
            </div>

            <div class="security-info">
                <p><strong>Security Tips:</strong></p>
                <ul>
                    <li>Never share your password with anyone</li>
                    <li>Always logout after your session</li>
                    <li>Use a secure and private internet connection</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
